<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reese Rosemary Knollenberg</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Jost', sans-serif;
      background: #fdf8f2;
      min-height: 100vh;
      padding: 2.5rem 1.25rem 3.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: repeating-linear-gradient(
        to right,
        rgba(180,165,140,0.13) 0px,
        rgba(180,165,140,0.13) 1px,
        transparent 1px,
        transparent 22px
      );
      pointer-events: none;
      z-index: 0;
    }

    .inner {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
    }

    .hero { text-align: center; margin-bottom: 2rem; }

    .rosette { width: 52px; height: 52px; margin: 0 auto 1rem; }

    .eyebrow {
      font-size: 10px; font-weight: 500; letter-spacing: 0.2em;
      text-transform: uppercase; color: #b09278; margin-bottom: 0.5rem;
    }

    .name {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(2rem, 8vw, 2.8rem); font-weight: 400;
      color: #3d2f24; line-height: 1.05; margin-bottom: 0.2rem;
    }

    .surname {
      font-family: 'Cormorant Garamond', serif; font-size: 1rem;
      font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      color: #8c7060; margin-bottom: 0.35rem;
    }

    .due-line { font-size: 12px; color: #a08878; letter-spacing: 0.04em; }

    .datetime-bar {
      background: #f2e8dc;
      border: 0.5px solid #ddd0bf;
      border-radius: 10px;
      padding: 0.65rem 1rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .datetime-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem; font-weight: 500; color: #3d2f24;
      letter-spacing: 0.04em; line-height: 1.1;
    }

    .datetime-date {
      font-size: 11px; color: #a08878; letter-spacing: 0.1em;
      text-transform: uppercase; margin-top: 2px;
    }

    .datetime-tz {
      font-size: 10px; color: #b09278; letter-spacing: 0.08em; margin-top: 1px;
    }

    .divider {
      display: flex; align-items: center; gap: 10px; margin: 1.25rem 0;
    }
    .divider-line { flex: 1; height: 0.5px; background: #d9c9b8; }
    .divider-dot { width: 5px; height: 5px; border-radius: 50%; background: #c9a882; }

    .countdown-row {
      display: flex; justify-content: center; gap: 10px;
      margin-bottom: 2rem; flex-wrap: wrap;
    }

    .cd-block {
      background: #fff8f0; border: 0.5px solid #ddd0bf;
      border-radius: 12px; padding: 1rem 0.75rem;
      text-align: center; flex: 1; min-width: 72px; max-width: 120px;
    }

    .cd-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 2.6rem);
      font-weight: 500; color: #3d2f24; line-height: 1; display: block;
    }

    .cd-unit {
      font-size: 10px; font-weight: 400; letter-spacing: 0.12em;
      text-transform: uppercase; color: #b09278; margin-top: 5px; display: block;
    }

    .card {
      background: #fff8f0; border: 0.5px solid #ddd0bf;
      border-radius: 14px; padding: 1.25rem; margin-bottom: 0.85rem;
    }

    .week-badge {
      display: inline-block; background: #f2e3d5; color: #8c5a3c;
      font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 10px;
      border-radius: 20px; margin-bottom: 0.75rem;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.2rem;
      font-weight: 500; color: #3d2f24; margin-bottom: 0.5rem;
    }

    .card-body { font-size: 13px; line-height: 1.75; color: #7a6254; }

    .size-row {
      display: flex; align-items: center; gap: 12px;
      margin-top: 1rem; padding-top: 1rem;
      border-top: 0.5px solid #e5d5c5;
      font-size: 13px; color: #8c7060;
    }

    .size-fruit { font-size: 2rem; }
    .size-text strong { font-weight: 500; color: #3d2f24; }

    .milestones { display: flex; flex-direction: column; gap: 8px; margin-top: 0.75rem; }

    .milestone {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; color: #7a6254; line-height: 1.55;
    }

    .dot-rose {
      width: 6px; height: 6px; border-radius: 50%;
      background: #c9948a; flex-shrink: 0; margin-top: 6px;
    }

    .progress-wrap { margin-top: 1.75rem; }

    .progress-bar-bg {
      height: 3px; background: #e5d5c5; border-radius: 2px; margin-bottom: 0.5rem;
    }

    .progress-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(to right, #c9948a, #b09278);
      transition: width 0.6s ease;
    }

    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 10px; color: #b09278; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="inner">

    <div class="hero">
      <svg class="rosette" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="10" fill="#f2ddd5" stroke="#c9948a" stroke-width="0.5"/>
        <g stroke="#c9948a" stroke-width="0.5" fill="#fdf0ea">
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(0 24 24) translate(0,-14)"/>
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(45 24 24) translate(0,-14)"/>
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(90 24 24) translate(0,-14)"/>
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(135 24 24) translate(0,-14)"/>
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(180 24 24) translate(0,-14)"/>
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(225 24 24) translate(0,-14)"/>
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(270 24 24) translate(0,-14)"/>
          <ellipse cx="24" cy="10" rx="3.5" ry="5.5" transform="rotate(315 24 24) translate(0,-14)"/>
        </g>
        <circle cx="24" cy="24" r="6" fill="#e8c4b8" stroke="#c9948a" stroke-width="0.5"/>
        <circle cx="24" cy="24" r="3" fill="#c9948a"/>
      </svg>
      <div class="eyebrow">counting down to</div>
      <div class="name">Reese Rosemary</div>
      <div class="surname">Knollenberg</div>
      <div class="due-line">Due August 11, 2025</div>
    </div>

    <div class="datetime-bar">
      <div class="datetime-time" id="live-time">—</div>
      <div class="datetime-date" id="live-date">—</div>
      <div class="datetime-tz">Central Time</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-dot" style="background:#dab89a;"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="countdown-row">
      <div class="cd-block"><span class="cd-num" id="cd-days">—</span><span class="cd-unit">days</span></div>
      <div class="cd-block"><span class="cd-num" id="cd-hrs">—</span><span class="cd-unit">hours</span></div>
      <div class="cd-block"><span class="cd-num" id="cd-min">—</span><span class="cd-unit">minutes</span></div>
      <div class="cd-block"><span class="cd-num" id="cd-sec">—</span><span class="cd-unit">seconds</span></div>
    </div>

    <div class="card">
      <div class="week-badge" id="week-label">Week —</div>
      <div class="card-title" id="week-title">Loading…</div>
      <div class="card-body" id="week-body"></div>
      <div class="size-row">
        <div class="size-fruit" id="size-icon">🌱</div>
        <div class="size-text"><strong id="size-name">—</strong><br><span id="size-detail"></span></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Milestones this week</div>
      <div class="milestones" id="milestones-list"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-label">
        <span>Week 1</span>
        <span id="progress-pct">—</span>
        <span>Week 40</span>
      </div>
    </div>

  </div>

  <script>
    const DUE = new Date('2025-08-11T00:00:00');
    const CONCEPTION = new Date(DUE);
    CONCEPTION.setDate(CONCEPTION.getDate() - 280);

    const weekData = {
      4:  { title: "A tiny cluster of cells", symptoms: "Implantation may cause light spotting. Fatigue and tender breasts begin.", size: "🫐", sizeName: "Poppy seed", sizeDetail: "~2mm", milestones: ["Embryo has implanted in the uterus", "Placenta begins forming", "Amniotic sac developing"] },
      5:  { title: "Heart begins to beat", symptoms: "Nausea, fatigue, and frequent urination kicking in.", size: "🫐", sizeName: "Sesame seed", sizeDetail: "~4mm", milestones: ["Heart starts beating", "Neural tube forming", "Tiny arm and leg buds appear"] },
      6:  { title: "Brain waves detected", symptoms: "Morning sickness often peaks. Smell sensitivity is high.", size: "🫐", sizeName: "Lentil", sizeDetail: "~6mm", milestones: ["Brain and spinal cord forming rapidly", "Eyes and ears beginning to develop", "Fingers and toes starting to form"] },
      7:  { title: "Growing fast", symptoms: "Nausea, food aversions, and exhaustion common.", size: "🫐", sizeName: "Blueberry", sizeDetail: "~1cm", milestones: ["Hands and feet visible", "Heartbeat audible on ultrasound", "Digestive tract developing"] },
      8:  { title: "All major organs forming", symptoms: "Breast changes, nausea, and mood swings.", size: "🍓", sizeName: "Raspberry", sizeDetail: "~1.6cm", milestones: ["All major organs present in basic form", "Fingers and toes distinct", "Cartilage forming"] },
      9:  { title: "Officially a fetus", symptoms: "Fatigue may ease slightly. Belly just starting to change.", size: "🍒", sizeName: "Cherry", sizeDetail: "~2.3cm", milestones: ["Embryo → fetus transition", "Teeth buds forming", "External genitalia beginning to differentiate"] },
      10: { title: "Tiny gymnast", symptoms: "Mood swings, round ligament pain may start.", size: "🍓", sizeName: "Strawberry", sizeDetail: "~3cm", milestones: ["Vital organs fully formed", "Moves and kicks (not felt yet)", "Fingernails forming"] },
      11: { title: "Bones hardening", symptoms: "Nausea often easing. Energy may start returning.", size: "🫛", sizeName: "Lime", sizeDetail: "~4cm", milestones: ["Bones and cartilage developing", "Hiccupping begins", "Reflexes developing"] },
      12: { title: "End of first trimester", symptoms: "Nausea often fades. Energy returns for many.", size: "🍋", sizeName: "Plum", sizeDetail: "~5.5cm", milestones: ["First trimester complete", "Kidneys producing urine", "Thyroid functioning"] },
      13: { title: "Second trimester begins", symptoms: "Energy boost for many. Appetite increasing.", size: "🍑", sizeName: "Peach", sizeDetail: "~7cm", milestones: ["Fingerprints forming", "Vocal cords developing", "Intestines moving into abdominal cavity"] },
      14: { title: "Facial expressions", symptoms: "Round ligament pain, increased appetite.", size: "🍋", sizeName: "Lemon", sizeDetail: "~8.5cm", milestones: ["Can squint, frown, and grimace", "Fine lanugo hair covering body", "Liver producing bile"] },
      15: { title: "Ears tuning in", symptoms: "Possible nosebleeds, heartburn starting.", size: "🍎", sizeName: "Apple", sizeDetail: "~10cm", milestones: ["Baby can hear sounds", "Legs now longer than arms", "Taste buds forming"] },
      16: { title: "Feeling the first flutters", symptoms: "Possible quickening — fluttery movement sensation.", size: "🥑", sizeName: "Avocado", sizeDetail: "~11.5cm", milestones: ["May feel first movement (quickening)", "Eyes moving side to side", "Scalp hair pattern forming"] },
      17: { title: "Putting on fat", symptoms: "Backaches, swollen feet. Appetite strong.", size: "🍐", sizeName: "Turnip", sizeDetail: "~13cm", milestones: ["Baby starts storing fat", "Swallowing and sucking reflexes", "Umbilical cord growing stronger"] },
      18: { title: "Anatomy scan week", symptoms: "Increased energy, possible Braxton Hicks.", size: "🥒", sizeName: "Bell pepper", sizeDetail: "~14cm", milestones: ["Anatomy ultrasound this week", "Ears fully developed", "Nervous system maturing rapidly"] },
      19: { title: "Protected by vernix", symptoms: "Leg cramps, backache, dizziness possible.", size: "🥒", sizeName: "Mango", sizeDetail: "~15cm", milestones: ["Vernix (protective coating) forming", "Kicks becoming stronger", "Sensory development accelerating"] },
      20: { title: "Halfway there!", symptoms: "Stronger kicks, belly button may flatten.", size: "🍌", sizeName: "Banana", sizeDetail: "~16.5cm", milestones: ["Halfway milestone!", "Swallowing amniotic fluid", "Sleep-wake cycles developing"] },
      21: { title: "Rapid weight gain begins", symptoms: "Heartburn, Braxton Hicks, swollen ankles.", size: "🥕", sizeName: "Carrot", sizeDetail: "~26cm", milestones: ["Bone marrow producing blood cells", "Tasting flavors from amniotic fluid", "Sucking reflex strengthening"] },
      22: { title: "Looking like a newborn", symptoms: "Stretch marks may appear. Linea nigra visible.", size: "🌽", sizeName: "Corn", sizeDetail: "~28cm", milestones: ["Eyebrows and eyelashes present", "Grip is strong", "Eyes forming iris pigment"] },
      23: { title: "Viability milestone approaching", symptoms: "Shortness of breath, backache, leg cramps.", size: "🍈", sizeName: "Grapefruit", sizeDetail: "~29cm", milestones: ["Lungs developing surfactant", "Viability threshold approaching", "Can respond to sound outside womb"] },
      24: { title: "Viable outside the womb", symptoms: "Braxton Hicks more frequent. Lower back pain.", size: "🌽", sizeName: "Ear of corn", sizeDetail: "~30cm", milestones: ["Legal viability milestone (24 weeks)", "Rapid brain development", "Taste and smell senses maturing"] },
      25: { title: "Filling out", symptoms: "Hemorrhoids possible. Sleep harder to find.", size: "🥬", sizeName: "Cauliflower", sizeDetail: "~35cm", milestones: ["Startle reflex developing", "Responding to your voice", "Nostrils opening"] },
      26: { title: "Eyes open for the first time", symptoms: "Leg cramps, sciatica, heartburn.", size: "🥬", sizeName: "Scallion bunch", sizeDetail: "~36cm", milestones: ["Eyelids open — can see light", "Inhaling and exhaling amniotic fluid", "Brain developing rapidly"] },
      27: { title: "Third trimester arrives soon", symptoms: "Swelling, Braxton Hicks, fatigue returns.", size: "🥦", sizeName: "Head of broccoli", sizeDetail: "~37cm", milestones: ["Immune system strengthening", "Sleep cycles with REM sleep", "Hiccups felt by mom"] },
      28: { title: "Third trimester!", symptoms: "Pelvic pressure, shortness of breath, fatigue.", size: "🍆", sizeName: "Eggplant", sizeDetail: "~38cm", milestones: ["Third trimester begins", "Blinking and seeing light/dark", "Practice breathing begins"] },
      29: { title: "Brain developing fast", symptoms: "Frequent urination, backache, Braxton Hicks.", size: "🥬", sizeName: "Butternut squash", sizeDetail: "~39cm", milestones: ["Brain surface developing folds", "Bones fully developed (still soft)", "Kicking strongly and often"] },
      30: { title: "Gaining a pound a week", symptoms: "Heartburn, shortness of breath, leaky breasts.", size: "🥬", sizeName: "Large cabbage", sizeDetail: "~40cm", milestones: ["Putting on ½ lb per week", "Lanugo beginning to shed", "Eyes developing focus capability"] },
      31: { title: "All five senses working", symptoms: "Trouble sleeping, pelvic pressure, Braxton Hicks.", size: "🥥", sizeName: "Coconut", sizeDetail: "~41cm", milestones: ["All five senses functional", "Rapid immune system development", "Settling into head-down position"] },
      32: { title: "Practicing survival skills", symptoms: "Shortness of breath eases as baby drops.", size: "🎃", sizeName: "Jicama", sizeDetail: "~42cm", milestones: ["Practicing breathing, sucking, blinking", "Toenails and fingernails complete", "Gaining critical brain mass"] },
      33: { title: "Skull hardening", symptoms: "Pelvic pressure, leaky breasts, difficulty sleeping.", size: "🍍", sizeName: "Pineapple", sizeDetail: "~44cm", milestones: ["Skull bones remain pliable for birth", "Immune antibodies transferring from mom", "Fat layers insulating body"] },
      34: { title: "Lungs nearly ready", symptoms: "Pelvic pressure, frequent urination, fatigue.", size: "🥬", sizeName: "Butternut squash", sizeDetail: "~45cm", milestones: ["Lungs almost fully mature", "Central nervous system maturing", "Reese recognizes your voice"] },
      35: { title: "Full-term in 2 weeks", symptoms: "Pelvic pain, Braxton Hicks, nesting instinct.", size: "🥬", sizeName: "Honeydew melon", sizeDetail: "~46cm", milestones: ["Kidneys fully developed", "Liver processing waste", "Physical development nearly complete"] },
      36: { title: "Early term", symptoms: "Lightening (baby dropping). Easier to breathe!", size: "🥬", sizeName: "Head of romaine", sizeDetail: "~47cm", milestones: ["Vernix and lanugo shedding", "Sucking muscles strong", "Preparing for birth position"] },
      37: { title: "Full term!", symptoms: "Pelvic pressure, nesting urge, mucus plug may release.", size: "🫁", sizeName: "Winter melon", sizeDetail: "~48cm", milestones: ["Officially full term", "Ready to breathe air", "Final weight gaining"] },
      38: { title: "Any day now", symptoms: "Lightening, nesting, Braxton Hicks intensifying.", size: "🎃", sizeName: "Pumpkin", sizeDetail: "~49cm", milestones: ["Vocal cords ready", "Organs fully mature", "Brain still rapidly developing"] },
      39: { title: "Almost time", symptoms: "Loss of mucus plug, water may break.", size: "🍉", sizeName: "Mini watermelon", sizeDetail: "~50cm", milestones: ["Immune system primed", "Amniotic fluid volume decreasing", "Final position settling"] },
      40: { title: "Due date week — we can't wait to meet Reese!", symptoms: "Cervix effacing and dilating. She is ready!", size: "🍉", sizeName: "Watermelon", sizeDetail: "~51cm", milestones: ["Full term complete", "Ready to meet the world", "She's here any moment"] },
    };

    function getWeek() {
      const now = new Date();
      const days = Math.floor((now - CONCEPTION) / 86400000);
      return Math.max(4, Math.min(40, Math.floor(days / 7)));
    }

    function getCentralTime() {
      const now = new Date();
      const time = now.toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
      const date = now.toLocaleString('en-US', { timeZone: 'America/Chicago', weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      return { time, date };
    }

    function tick() {
      const now = new Date();
      const diff = DUE - now;

      const { time, date } = getCentralTime();
      document.getElementById('live-time').textContent = time;
      document.getElementById('live-date').textContent = date;

      if (diff <= 0) {
        ['cd-days','cd-hrs','cd-min','cd-sec'].forEach(id => document.getElementById(id).textContent = '0');
        return;
      }
      document.getElementById('cd-days').textContent = Math.floor(diff / 86400000);
      document.getElementById('cd-hrs').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
      document.getElementById('cd-min').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
      document.getElementById('cd-sec').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
    }

    function renderWeek() {
      const w = getWeek();
      const d = weekData[w] || weekData[40];
      document.getElementById('week-label').textContent = `Week ${w}`;
      document.getElementById('week-title').textContent = d.title;
      document.getElementById('week-body').textContent = d.symptoms;
      document.getElementById('size-icon').textContent = d.size;
      document.getElementById('size-name').textContent = d.sizeName;
      document.getElementById('size-detail').textContent = `About ${d.sizeDetail} long`;
      const list = document.getElementById('milestones-list');
      list.innerHTML = '';
      d.milestones.forEach(m => {
        const el = document.createElement('div');
        el.className = 'milestone';
        el.innerHTML = `<div class="dot-rose"></div><span>${m}</span>`;
        list.appendChild(el);
      });
      const pct = Math.round(((w - 1) / 39) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-pct').textContent = `Week ${w} of 40`;
    }

    tick();
    renderWeek();
    setInterval(tick, 1000);
  </script>
</body>
</html>
